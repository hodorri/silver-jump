<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>화산귀환</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0d0018; }
#wrap {
  display: flex; flex-direction: column; align-items: center;
  width: 100%; height: 100%;
  background: linear-gradient(180deg, #1a0a2e 0%, #2d0a3e 45%, #4a1a3a 75%, #6b2a40 100%);
  position: relative; overflow: hidden;
  font-family: 'Courier New', monospace;
}
#topbar {
  width: 100%; display: flex; justify-content: space-between; align-items: center;
  padding: 14px 18px 6px; z-index: 10; flex-shrink: 0;
}
.title-txt { font-size: 22px; font-weight: 700; color: #f5c0d0; letter-spacing: 3px; }
.studio-txt { font-size: 9px; color: #c090a0; letter-spacing: 1px; margin-top: 2px; }
#score-txt { font-size: 13px; color: #f0d0e0; letter-spacing: 1px; }
canvas { display: block; flex-shrink: 0; touch-action: none; }
#jump-btn {
  position: absolute; bottom: 28px; right: 22px;
  width: 72px; height: 72px; border-radius: 50%;
  border: 2px solid rgba(240,160,184,0.7);
  background: rgba(224,112,144,0.2);
  color: #f5c0d0; font-size: 26px;
  display: none; align-items: center; justify-content: center;
  cursor: pointer; z-index: 15; touch-action: none;
}
#jump-btn:active { background: rgba(224,112,144,0.45); transform: scale(0.92); }
#jump-btn.show { display: flex; }
#overlay, #gameover-panel {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 16px; z-index: 20;
  background: rgba(10,0,20,0.85);
  padding: 2rem 1.5rem; text-align: center;
}
#gameover-panel { display: none; overflow-y: auto; }
#gameover-panel.show { display: flex; }
.hint-txt { font-size: 13px; color: #e0b0c8; letter-spacing: 1px; line-height: 1.9; }
.start-btn, .retry-btn {
  padding: 16px 44px; border: 1.5px solid #e07090; border-radius: 8px;
  background: rgba(224,112,144,0.14); color: #f5c0d0;
  font-size: 16px; font-family: 'Courier New', monospace;
  cursor: pointer; letter-spacing: 3px; min-width: 170px;
}
.start-btn:active, .retry-btn:active { background: rgba(224,112,144,0.32); transform: scale(0.97); }
.go-score { font-size: 12px; color: #c090a0; letter-spacing: 2px; }
.quote-box {
  border: 1px solid rgba(224,112,144,0.45); border-radius: 12px;
  background: rgba(255,255,255,0.05);
  padding: 1.2rem 1.4rem; max-width: 360px; width: 100%;
}
.q-char { font-size: 11px; color: #c090a0; margin-bottom: 10px; letter-spacing: 1px; }
.q-text { font-size: 16px; color: #f5e0ea; line-height: 1.8; font-weight: 500; white-space: pre-line; }
.q-note { font-size: 11px; color: #a07080; margin-top: 10px; }
.love-note {
  font-size: 15px; color: #f5c0d0; padding: 14px 20px;
  border: 1px solid rgba(224,112,144,0.35); border-radius: 10px;
  background: rgba(240,112,144,0.09);
  max-width: 360px; width: 100%; line-height: 1.8; text-align: center;
}
.love-sign { display: block; margin-top: 8px; font-size: 13px; color: #e090b0; letter-spacing: 1px; }
</style>
</head>
<body>
<div id="wrap">
  <div id="topbar">
    <div><div class="title-txt">으녁귀환 💗</div><div class="studio-txt">STUDIO SUNWOO</div></div>
    <div id="score-txt">SCORE: <span id="sd">0</span></div>
  </div>
  <canvas id="gc"></canvas>
  <div id="jump-btn">↑</div>
  <div id="overlay">
    <div class="hint-txt">화면을 탭하거나<br>점프 버튼을 눌러요</div>
    <button class="start-btn" id="start-btn">START</button>
  </div>
  <div id="gameover-panel">
    <div class="go-score">SCORE · <span id="go-score">0</span></div>
    <div class="quote-box">
      <div class="q-char" id="q-char"></div>
      <div class="q-text" id="q-text"></div>
      <div class="q-note" id="q-note"></div>
    </div>
    <div class="love-note">
      자기얍 🌸 자기 옆엔 항상 내가 있어 잊지마!
      <span class="love-sign">— 선우 💕</span>
    </div>
    <button class="retry-btn" id="retry-btn">RETRY</button>
  </div>
</div>

const C = {
  petal1:'#f0a0b8', petal2:'#e87090', petal3:'#ffd0e0',
  ground:'#2a0a1a', groundL:'#3a1020',
  obs:'#4a0a20', obsL:'#7a1a40', obsHL:'#f0a0b8', moonR:'#f0c8d8',
};

function getW() { return canvas.width; }
function getH() { return canvas.height; }
function getGR() { return Math.round(canvas.height * 0.86); }
function getCW() { return Math.round(canvas.width * 0.16); }
function getCH() { return Math.round(canvas.width * 0.22); }

function resizeCanvas() {
  const topbarH = document.getElementById('topbar').offsetHeight;
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight - topbarH;
  canvas.style.width = canvas.width + 'px';
  canvas.style.height = canvas.height + 'px';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ---- 게임 상태 ----
let state = 'idle';
let score = 0, frame = 0, speed = 2.2, nextObs = 80;
let player = {};
let obstacles = [];
let petals = [];
let groundDots = [];
let rafId = null; // requestAnimationFrame ID

function initEntities() {
  player = { x: Math.round(getW()*0.18), y: getGR(), vy:0, onGround:true };
  petals = Array.from({length:22}, () => ({
    x:Math.random()*getW(), y:Math.random()*getH(),
    vy:0.5+Math.random()*0.8, vx:-0.4-Math.random()*0.5,
    r:Math.random()*Math.PI*2, size:2+Math.floor(Math.random()*4),
    color:[C.petal1,C.petal2,C.petal3][Math.floor(Math.random()*3)]
  }));
  groundDots = Array.from({length:40},(_,i)=>({
    x:i*(getW()/37), y:getGR()+Math.floor(Math.random()*5)
  }));
}

function drawChar(bx, by) {
  const cw=getCW(), ch=getCH();
  const x=Math.round(bx-cw/2), y=Math.round(by-ch);
  const bob=Math.sin(frame*0.25)*2;
  ctx.save();
  ctx.imageSmoothingEnabled=true;
  ctx.imageSmoothingQuality='high';
  ctx.drawImage(charImg, x, y+bob, cw, ch);
  ctx.restore();
}

function drawObs(o) {
  const gr=getGR(), x=Math.round(o.x), y=gr-o.h;
  for(let dy=0;dy<o.h;dy+=2) for(let dx=0;dx<o.w;dx+=2){
    ctx.fillStyle=dy<4?C.obsHL:dy<o.h/2?C.obsL:C.obs;
    ctx.fillRect(x+dx,y+dy,2,2);
  }
  ctx.fillStyle=C.petal1;
  ctx.fillRect(x+4,y+4,2,2); ctx.fillRect(x+o.w-6,y+4,2,2);
}

function drawPetals() {
  petals.forEach(p=>{
    ctx.save(); ctx.fillStyle=p.color; ctx.globalAlpha=0.85;
    ctx.translate(p.x+p.size,p.y+p.size); ctx.rotate(p.r);
    ctx.fillRect(-p.size,-p.size/2,p.size*2,p.size); ctx.restore();
  });
}

function drawGround() {
  const gr=getGR(), w=getW(), h=getH();
  ctx.fillStyle=C.ground; ctx.fillRect(0,gr+14,w,h-gr-14);
  ctx.fillStyle=C.groundL; ctx.fillRect(0,gr+14,w,4);
  groundDots.forEach(d=>{ ctx.fillStyle=C.groundL; ctx.fillRect(d.x,d.y,3,2); });
}

function drawBg() {
  const w=getW(), h=getH();
  ctx.fillStyle='#1a0a2e'; ctx.fillRect(0,0,w,h*0.4);
  ctx.fillStyle='#2d0a3e'; ctx.fillRect(0,h*0.4,w,h*0.3);
  ctx.fillStyle='#4a1a3a'; ctx.fillRect(0,h*0.7,w,h*0.3);
  ctx.fillStyle=C.moonR; ctx.globalAlpha=0.22;
  ctx.beginPath(); ctx.arc(w*0.78,h*0.12,Math.round(w*0.07),0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;
}

function reset() {
  score=0; frame=0; speed=3.5; nextObs=80;
  obstacles=[];
  initEntities();
  document.getElementById('sd').textContent='0';
}

function jump() {
  if(player.onGround && state==='running'){
    player.vy=-(getH()*0.042);
    player.onGround=false;
  }
}

function stopLoop() {
  if(rafId) { cancelAnimationFrame(rafId); rafId=null; }
}

function startGame() {
  document.getElementById('overlay').style.display='none';
  document.getElementById('jump-btn').classList.add('show');
  stopLoop();
  state='running'; reset();
  rafId=requestAnimationFrame(tick);
}

function retryGame() {
  document.getElementById('gameover-panel').classList.remove('show');
  document.getElementById('jump-btn').classList.add('show');
  stopLoop();
  state='running'; reset();
  rafId=requestAnimationFrame(tick);
}

function gameOver() {
  state='over';
  stopLoop();
  document.getElementById('jump-btn').classList.remove('show');
  const q=quotes[Math.floor(Math.random()*quotes.length)];
  document.getElementById('q-char').textContent=q.char;
  document.getElementById('q-text').textContent=q.text;
  document.getElementById('q-note').textContent=q.note;
  document.getElementById('go-score').textContent=score;
  document.getElementById('gameover-panel').classList.add('show');
}

function tick() {
  if(state!=='running') return;
  const w=getW(), h=getH(), gr=getGR();
  ctx.clearRect(0,0,w,h); drawBg();
  frame++; score=Math.floor(frame/6); speed=3.5+score*0.006;
  document.getElementById('sd').textContent=score;

  petals.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.r+=0.02;
    if(p.y>h){p.y=-8;p.x=Math.random()*w;}
    if(p.x<-12){p.x=w+6;}
  });
  drawPetals();
  groundDots.forEach(d=>{d.x-=speed*0.3;if(d.x<0)d.x=w+2;});
  drawGround();

  nextObs--;
  if(nextObs<=0){
    const oh=Math.round(h*0.045)+Math.floor(Math.random()*Math.round(h*0.03));
    const ow=Math.round(w*0.042)+Math.floor(Math.random()*Math.round(w*0.022));
    obstacles.push({x:w, w:ow, h:oh});
    nextObs=72+Math.floor(Math.random()*52)-Math.min(score*0.12,26);
  }
  obstacles=obstacles.filter(o=>o.x>-60);
  obstacles.forEach(o=>{o.x-=speed; drawObs(o);});

  const gravity=h*0.0028;
  if(!player.onGround){player.vy+=gravity;player.y+=player.vy;}
  if(player.y>=gr){player.y=gr;player.vy=0;player.onGround=true;}

  const cw=getCW(), ch=getCH();
  for(const o of obstacles){
    if(player.x-cw*0.3<o.x+o.w && player.x+cw*0.3>o.x && player.y>gr-o.h){
      gameOver(); return;
    }
  }
  drawChar(player.x, player.y);
  rafId=requestAnimationFrame(tick);
}

// 이벤트
document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('start-btn').addEventListener('touchend', e=>{e.preventDefault();startGame();});
document.getElementById('retry-btn').addEventListener('click', retryGame);
document.getElementById('retry-btn').addEventListener('touchend', e=>{e.preventDefault();retryGame();});
const jb=document.getElementById('jump-btn');
jb.addEventListener('touchstart',e=>{e.preventDefault();jump();},{passive:false});
jb.addEventListener('click', jump);
canvas.addEventListener('touchstart',e=>{e.preventDefault();jump();},{passive:false});
canvas.addEventListener('click', jump);
document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();jump();}});
</script>
